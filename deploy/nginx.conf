# =============================================================================
# base-web nginx config — rev1 deploy 版本(W-F2)
#
# 新建檔 — 替換 nginx:1.27-alpine 預設 /etc/nginx/conf.d/default.conf。
#
# 設計要點:
# - listen 8080(對齊 Dockerfile EXPOSE,per FR-014/015)
# - 3 個 location 優先級:exact `=` > regex `~*` > prefix `/`(per R-006 nginx 預設行為)
# - `location = /health` 返 200 "ok"(per FR-016 + Q3 clarify,對齊 W-F1 紀律)
# - assets regex 套 30d immutable cache(per FR-017,Vite hashed assets 安全)
# - SPA fallback `/` 套顯式 no-cache header(per FR-019 + R-007:nginx 預設無
#   Cache-Control 不等於瀏覽器 no-cache,deploy 新版時用戶須拿新 index.html)
# - 不 proxy `/api/*`(per FR-028,那是 W-F5 front-nginx 範疇)
# =============================================================================

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Priority 1: exact match /health(per FR-016 + Q3 clarify、對齊 W-F1)
    location = /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Priority 2: regex match Vite hashed assets(per FR-017)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?|ttf|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Priority 3: prefix match SPA fallback(per FR-018 + FR-019 + R-007)
    # try_files 找不到 path 時返 /index.html 讓 vue-router 客戶端處理。
    # 顯式 no-cache header 確保 deploy 新版時用戶能拉新 index.html。
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
}
